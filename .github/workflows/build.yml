name: Build LucidHealth iOS

on:
  push:
    paths:
      - 'ios/LucidHealth/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          echo "Available SDKs:"
          xcodebuild -showsdks | grep iphoneos || echo "No iphoneos SDK found"

      - name: Inject Gemini API key
        run: |
          sed -i '' 's/private let apiKey: String = "local-dev"/private let apiKey: String = "${{ secrets.GOOGLE_AI_API_KEY }}"/' \
            ios/LucidHealth/LucidHealth/Services/GeminiClient.swift
          echo "=== GeminiClient apiKey after injection (value masked) ==="
          grep 'apiKey' ios/LucidHealth/LucidHealth/Services/GeminiClient.swift | \
            sed 's/= ".*"/= "***"/' | head -3

      - name: Inject auth credentials + Supabase config
        run: |
          # Email + password (login auto-fill)
          sed -i '' 's|static let prefilledEmail: String = "BUILD_EMAIL"|static let prefilledEmail: String = "${{ secrets.EE_TASKS_EMAIL }}"|' \
            ios/LucidHealth/LucidHealth/Services/SupabaseClient.swift
          sed -i '' 's|static let prefilledPassword: String = "BUILD_PASSWORD"|static let prefilledPassword: String = "${{ secrets.EE_TASKS_PASSWORD }}"|' \
            ios/LucidHealth/LucidHealth/Services/SupabaseClient.swift

          # Supabase URL, anon key, and Hermes user ID — injected from GHA secrets/vars
          sed -i '' 's|"BUILD_SUPABASE_URL"|"${{ vars.SUPABASE_URL || secrets.SUPABASE_URL }}"|' \
            ios/LucidHealth/LucidHealth/Services/SupabaseClient.swift
          sed -i '' 's|"BUILD_ANON_KEY"|"${{ secrets.SUPABASE_ANON_KEY }}"|' \
            ios/LucidHealth/LucidHealth/Services/SupabaseClient.swift
          sed -i '' 's|"BUILD_USER_ID"|"${{ secrets.HERMES_USER_ID }}"|' \
            ios/LucidHealth/LucidHealth/Services/SupabaseClient.swift

          echo "=== SupabaseClient after injection (values masked) ==="
          grep -E 'prefilledEmail|prefilledPassword|baseURL|anonKey|let userId' \
            ios/LucidHealth/LucidHealth/Services/SupabaseClient.swift | \
            sed 's/= ".*"/= "***"/' | head -8

      - name: Inject commit SHA + build date into BuildInfo.swift
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BUILD_INFO=ios/LucidHealth/LucidHealth/BuildInfo.swift
          sed -i '' "s|static let commitHash: String = \"local-dev\"|static let commitHash: String = \"${GITHUB_SHA}\"|" "$BUILD_INFO"
          sed -i '' "s|static let buildDate:  String = \"unknown\"|static let buildDate:  String = \"${BUILD_DATE}\"|" "$BUILD_INFO"
          echo "=== BuildInfo.swift after injection ==="
          cat "$BUILD_INFO"

      - name: Build for device (ad-hoc signed with entitlements)
        working-directory: ios/LucidHealth
        run: |
          xcodebuild build \
            -project LucidHealth.xcodeproj \
            -scheme LucidHealth \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO \
            SWIFT_VERSION=5.0 \
            CURRENT_PROJECT_VERSION=${GITHUB_RUN_NUMBER} \
            MARKETING_VERSION=1.0.${GITHUB_RUN_NUMBER} \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            EXCLUDED_ARCHS=x86_64 \
            SUPPORTS_MACCATALYST=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            2>&1 | tee build.log || true

          grep -i "error:" build.log || echo "No explicit errors found"
          grep -c "error:" build.log && exit 65 || true

      - name: Verify embedded entitlements (App Groups must survive)
        run: |
          APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "LucidHealth.app" -type d | head -1)
          echo "=== Main app entitlements ==="
          codesign -d --entitlements - "$APP_PATH" 2>&1 | tee main-ent.txt || true
          if ! grep -q "application-groups" main-ent.txt; then
            echo "ERROR: main app missing application-groups entitlement"
            exit 1
          fi
          echo ""
          echo "=== Widget extension entitlements ==="
          WIDGET_PATH="$APP_PATH/PlugIns/LucidHealthWidgets.appex"
          if [ -d "$WIDGET_PATH" ]; then
            codesign -d --entitlements - "$WIDGET_PATH" 2>&1 | tee widget-ent.txt || true
            if ! grep -q "application-groups" widget-ent.txt; then
              echo "ERROR: widget extension missing application-groups entitlement"
              exit 1
            fi
          else
            echo "ERROR: widget extension not embedded"
            exit 1
          fi
          echo "Both targets have application-groups entitlement"

      - name: Package IPA
        run: |
          APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "LucidHealth.app" -type d | head -1)
          echo "Found app at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find LucidHealth.app"
            find $RUNNER_TEMP/DerivedData -name "*.app" -type d
            exit 1
          fi

          if [ -d "$APP_PATH/PlugIns/LucidHealthWidgets.appex" ]; then
            echo "Widget extension present — keeping its _CodeSignature intact"
          else
            echo "ERROR: Widget extension not found"
            exit 1
          fi

          xattr -cr "$APP_PATH"

          mkdir -p $RUNNER_TEMP/Payload
          ditto "$APP_PATH" "$RUNNER_TEMP/Payload/LucidHealth.app"
          cd $RUNNER_TEMP
          ditto -c -k --sequesterRsrc --keepParent Payload LucidHealth.ipa
          echo "IPA size: $(du -h LucidHealth.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LucidHealth-adhoc
          path: ${{ runner.temp }}/LucidHealth.ipa
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: lucidhealth-build-${{ github.run_number }}
          name: "LucidHealth build ${{ github.run_number }}"
          body: |
            Build ${{ github.run_number }} — ${{ github.sha }}
          files: ${{ runner.temp }}/LucidHealth.ipa
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy IPA to public directory
        run: |
          cp $RUNNER_TEMP/LucidHealth.ipa public/LucidHealth.ipa
          echo "IPA copied to public/"

      - name: Update AltStore Source JSON (merge — preserve sibling apps)
        env:
          RUN_NUMBER: ${{ github.run_number }}
          SUPABASE_STORAGE_PUBLIC_BASE: ${{ vars.SUPABASE_STORAGE_PUBLIC_BASE }}
        run: |
          IPA_SIZE=$(stat -f%z $RUNNER_TEMP/LucidHealth.ipa)
          BUILD_DATE_ISO=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)
          STORAGE_BASE="${SUPABASE_STORAGE_PUBLIC_BASE}"
          # Versioned URL — AltStore client-side cache key is the URL. By making
          # each build's IPA URL unique, AltStore can never serve a stale IPA
          # from cache after a source refresh, eliminating the recurring
          # "data isn't in the correct format" error users hit on update.
          DOWNLOAD_URL="${STORAGE_BASE}/LucidHealth-${RUN_NUMBER}.ipa"

          # Fetch current manifest (has LucidBridge + LucidFoods entries) — fallback to public/ copy
          curl -fsS "${STORAGE_BASE}/altstore-source.json" > /tmp/cur.json \
            || cp public/altstore-source.json /tmp/cur.json

          NEW_ENTRY=$(cat <<JSONEND
          {
            "name": "Lucid Health",
            "bundleIdentifier": "com.fabi.lucidhealth",
            "developerName": "Fabi",
            "localizedDescription": "Unified health companion - streams Whoop BLE data and logs meals with Gemini Vision to surface brain-health patterns.",
            "iconURL": "https://app.lucid-ai.app/icon-512.png",
            "tintColor": "#8B5CF6",
            "screenshotURLs": [],
            "version": "1.0.${RUN_NUMBER}",
            "buildVersion": "${RUN_NUMBER}",
            "versionDate": "${BUILD_DATE_ISO}",
            "downloadURL": "${DOWNLOAD_URL}",
            "size": ${IPA_SIZE},
            "minOSVersion": "26.0",
            "versions": [{"version":"1.0.${RUN_NUMBER}","buildVersion":"${RUN_NUMBER}","date":"${BUILD_DATE_ISO}","size":${IPA_SIZE},"downloadURL":"${DOWNLOAD_URL}","localizedDescription":"Build ${RUN_NUMBER}","minOSVersion":"26.0"}],
            "appPermissions": {"entitlements":[{"name":"com.apple.security.application-groups"}],"privacy":[{"name":"NSBluetoothAlwaysUsageDescription","usageDescription":"Connects to Whoop via BLE."},{"name":"NSBluetoothPeripheralUsageDescription","usageDescription":"Connects to Whoop via BLE (legacy peripheral key)."},{"name":"NSCameraUsageDescription","usageDescription":"Take photos of meals."},{"name":"NSPhotoLibraryUsageDescription","usageDescription":"Pick existing meal photos."},{"name":"NSHealthShareUsageDescription","usageDescription":"Reads health data from Apple Health for body-state correlation."},{"name":"NSHealthUpdateUsageDescription","usageDescription":"Writes recovery and HRV data back to Apple Health."},{"name":"NSLocationWhenInUseUsageDescription","usageDescription":"Tags meals and body-state snapshots with location."},{"name":"NSLocationAlwaysAndWhenInUseUsageDescription","usageDescription":"Background location for activity context (rides, walks)."}]}
          }
          JSONEND
          )

          jq --argjson newApp "$NEW_ENTRY" \
            '.apps |= (map(select(.bundleIdentifier != "com.fabi.lucidhealth")) + [$newApp])' \
            /tmp/cur.json > public/altstore-source.json

      - name: Upload IPA + source.json + ADP manifest to Supabase Storage
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_STORAGE_WRITE_BASE: ${{ vars.SUPABASE_STORAGE_WRITE_BASE }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          STORAGE_BASE="${SUPABASE_STORAGE_WRITE_BASE}"

          # Generate per-build ADP manifest so AltStore PAL's version check passes
          # (must match source.json's version + buildVersion for THIS build)
          cat > /tmp/lucidhealth-manifest.json <<MANIFEST
          {
            "appleItemId": "9000000002",
            "bundleId": "com.fabi.lucidhealth",
            "shortVersionString": "1.0.${RUN_NUMBER}",
            "bundleVersion": "${RUN_NUMBER}"
          }
          MANIFEST

          echo "Uploading lucidhealth-manifest.json (ADP manifest for AltStore PAL)..."
          curl -fsS -X PUT "${STORAGE_BASE}/lucidhealth-manifest.json" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            --data-binary @/tmp/lucidhealth-manifest.json

          echo ""
          echo "Uploading altstore-source.json..."
          curl -fsS -X PUT "${STORAGE_BASE}/altstore-source.json" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            --data-binary @public/altstore-source.json

          echo ""
          echo "Uploading LucidHealth-${{ github.run_number }}.ipa (versioned)..."
          curl -fsS -X PUT "${STORAGE_BASE}/LucidHealth-${{ github.run_number }}.ipa" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary @$RUNNER_TEMP/LucidHealth.ipa

          echo ""
          echo "Also uploading canonical LucidHealth.ipa (back-compat for source caches)..."
          curl -fsS -X PUT "${STORAGE_BASE}/LucidHealth.ipa" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary @$RUNNER_TEMP/LucidHealth.ipa

          echo ""
          echo "Storage upload complete."

      - name: Push AltStore Source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || git pull origin main
          git add -f public/altstore-source.json public/LucidHealth.ipa
          git diff --cached --quiet && exit 0
          git commit -m "AltStore source: LucidHealth build ${{ github.run_number }}"
          for i in 1 2 3; do
            git push origin HEAD:main && break
            git pull --rebase origin main
          done
